<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Point Rendering Example</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script type="module">
      import {
        Renderer,
        PointGeometry,
        createPointShader,
      } from "../src/index.ts";

      // 获取canvas元素
      const canvas = document.getElementById("canvas");

      // 设置canvas尺寸
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // 创建渲染器
      const renderer = new Renderer(canvas);
      renderer.setSize(canvas.width, canvas.height);

      // 创建点数据
      const points = [];
      const colors = [];
      // 生成100个随机点
      for (let i = 0; i < 100; i++) {
        const x = (Math.random() - 0.5) * 2;
        const y = (Math.random() - 0.5) * 2;
        const z = (Math.random() - 0.5) * 2;
        points.push(x, y, z);
        // 生成随机颜色
        const r = Math.random();
        const g = Math.random();
        const b = Math.random();
        const a = 1.0;
        colors.push(r, g, b, a);
      }

      // 将点转换为Float32Array
      const vertices = new Float32Array(points.flat());

      // 创建颜色数组
      const colorArray = new Float32Array(colors);

      // 创建点着色器
      const shader = createPointShader(renderer.gl);

      // 创建点几何体
      const pointGeometry = new PointGeometry(vertices, shader, colorArray);
      pointGeometry.setPointSize(10.0);

      // 添加几何体到渲染器
      renderer.addGeometry(pointGeometry);

      // 渲染循环
      function animate() {
        renderer.render();
        requestAnimationFrame(animate);
      }

      // 开始动画
      animate();

      // 窗口大小调整事件
      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        renderer.setSize(canvas.width, canvas.height);
      });
    </script>
  </body>
</html>
