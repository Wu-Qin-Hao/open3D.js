<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triangle Rendering Example</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script type="module">
      import {
        Renderer,
        TriangleGeometry,
        createColorShader,
      } from "../src/index.ts";

      // 获取canvas元素
      const canvas = document.getElementById("canvas");

      // 设置canvas尺寸
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // 创建渲染器
      const renderer = new Renderer(canvas);
      renderer.setSize(canvas.width, canvas.height);

      // 创建三角形数据
      const points = [
        [0, 0.5, 0], // 顶点1
        [-0.5, -0.5, 0], // 顶点2
        [0.5, -0.5, 0], // 顶点3
      ];

      // 创建颜色数据
      const colors = [
        1.0,
        0.0,
        0.0,
        1.0, // 红色
        0.0,
        1.0,
        0.0,
        1.0, // 绿色
        0.0,
        0.0,
        1.0,
        1.0, // 蓝色
      ];

      // 将点转换为Float32Array
      const vertices = new Float32Array(points.flat());

      // 创建颜色数组
      const colorArray = new Float32Array(colors);

      // 创建颜色着色器
      const shader = createColorShader(renderer.gl);

      // 创建三角形几何体
      const triangleGeometry = new TriangleGeometry(
        vertices,
        shader,
        colorArray,
      );

      // 添加几何体到渲染器
      renderer.addGeometry(triangleGeometry);

      // 渲染循环
      function animate() {
        renderer.render();
        requestAnimationFrame(animate);
      }

      // 开始动画
      animate();

      // 窗口大小调整事件
      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        renderer.setSize(canvas.width, canvas.height);
      });
    </script>
  </body>
</html>
