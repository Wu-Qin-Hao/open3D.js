<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triangle Rendering Example</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script type="module">
    import { Renderer, TriangleGeometry, createPointShader, Point } from './src/index.ts';

    // 获取canvas元素
    const canvas = document.getElementById('canvas');
    
    // 设置canvas尺寸
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 创建渲染器
    const renderer = new Renderer(canvas);
    renderer.setSize(canvas.width, canvas.height);

    // 创建三角形数据
    const points = [
      new Point(0, 0.5, 0),      // 顶点1
      new Point(-0.5, -0.5, 0),   // 顶点2
      new Point(0.5, -0.5, 0)     // 顶点3
    ];

    // 将点转换为Float32Array
    const vertices = new Float32Array(
      points.flatMap(point => point.toArray())
    );

    // 创建点着色器（三角形渲染也可以使用相同的着色器）
    const shader = createPointShader(renderer.gl);

    // 创建三角形几何体
    const triangleGeometry = new TriangleGeometry(vertices, shader);

    // 添加几何体到渲染器
    renderer.addGeometry(triangleGeometry);

    // 渲染循环
    function animate() {
      renderer.render();
      requestAnimationFrame(animate);
    }

    // 开始动画
    animate();

    // 窗口大小调整事件
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      renderer.setSize(canvas.width, canvas.height);
    });
  </script>
</body>
</html>
